<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eafaf1"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- ground -->
  <ellipse cx="260" cy="400" rx="230" ry="46" fill="#dff3e6"/>

  <!-- sun -->
  <circle cx="440" cy="70" r="40" fill="#ffd166"/>
  <g stroke="#ffd166" stroke-width="6" stroke-linecap="round">
    <line x1="440" y1="8" x2="440" y2="22"/>
    <line x1="494" y1="70" x2="480" y2="70"/>
    <line x1="486" y1="24" x2="476" y2="34"/>
  </g>

  <!-- house -->
  <rect x="60" y="200" width="150" height="130" rx="10" fill="#8ecae6"/>
  <path d="M50 205 L135 140 L220 205 Z" fill="#2f9e6e"/>
  <rect x="100" y="250" width="40" height="80" rx="6" fill="#fffaf2"/>
  <rect x="150" y="240" width="42" height="40" rx="6" fill="#fff3cf"/>

  <!-- balloons -->
  <g>
    <circle cx="330" cy="120" r="26" fill="#f4a4c0"/>
    <circle cx="368" cy="140" r="22" fill="#8ecae6"/>
    <circle cx="300" cy="150" r="18" fill="#ffd166"/>
    <path d="M330 146 v70 M368 162 v50 M300 168 v40" stroke="#89a" stroke-width="2"/>
  </g>

  <!-- child 1 -->
  <g>
    <circle cx="250" cy="300" r="30" fill="#ffe0bd"/>
    <path d="M222 295 a28 28 0 0 1 56 0 v-6 a28 28 0 0 0 -56 0 z" fill="#5a3825"/>
    <rect x="228" y="326" width="44" height="60" rx="18" fill="#f4a4c0"/>
    <circle cx="242" cy="298" r="3.5" fill="#333"/>
    <circle cx="260" cy="298" r="3.5" fill="#333"/>
    <path d="M244 310 q7 7 14 0" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- child 2 -->
  <g>
    <circle cx="330" cy="315" r="26" fill="#d9a066"/>
    <path d="M306 312 a24 24 0 0 1 48 0 v-4 a24 24 0 0 0 -48 0 z" fill="#2a2118"/>
    <rect x="311" y="338" width="38" height="52" rx="16" fill="#ffd166"/>
    <circle cx="323" cy="314" r="3" fill="#333"/>
    <circle cx="338" cy="314" r="3" fill="#333"/>
    <path d="M324 324 q6 6 13 0" stroke="#7a4a1e" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- blocks -->
  <g>
    <rect x="150" y="356" width="34" height="34" rx="5" fill="#2f9e6e"/>
    <rect x="150" y="322" width="34" height="34" rx="5" fill="#ffd166"/>
    <rect x="184" y="356" width="34" height="34" rx="5" fill="#f4a4c0"/>
    <text x="167" y="380" font-size="20" text-anchor="middle" fill="#fff" font-family="sans-serif" font-weight="bold">A</text>
    <text x="167" y="345" font-size="20" text-anchor="middle" fill="#6b5300" font-family="sans-serif" font-weight="bold">B</text>
  </g>

  <!-- cloud -->
  <g fill="#ffffff">
    <ellipse cx="120" cy="90" rx="34" ry="20"/>
    <ellipse cx="150" cy="96" rx="26" ry="16"/>
    <ellipse cx="92" cy="98" rx="22" ry="14"/>
  </g>
</svg>
